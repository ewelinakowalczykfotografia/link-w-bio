<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ewelina Kowalczyk Fotografia</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;1,500&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --teal-deep:#173E3B;
    --teal:#2E6F68;
    --turquoise:#5FB8AE;
    --sky:#BFE1DE;
    --gold:#C9A66B;
    --ivory:#F7F3EC;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    background:linear-gradient(180deg, var(--ivory) 0%, #EFF7F5 60%, var(--sky) 100%);
    font-family:'Montserrat',sans-serif;
    color:#2B2B2B;
    display:flex;
    justify-content:center;
    padding:48px 18px 60px;
  }
  .page{ width:100%; max-width:460px; text-align:center; }
  .logo{ width:180px; height:auto; margin:0 auto 6px; display:block; }
  .name{
    font-family:'Playfair Display', serif;
    font-style:italic;
    font-weight:500;
    font-size:26px;
    color:var(--teal-deep);
    margin:6px 0 2px;
  }
  .tagline{
    font-size:12.5px;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--teal);
    margin:0 0 8px;
  }
  .bio{
    font-size:14.5px;
    line-height:1.55;
    color:#3d4a48;
    margin:14px 0 30px;
    font-style:italic;
  }
  .btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    width:100%;
    padding:17px 20px;
    margin-bottom:16px;
    border-radius:14px;
    font-family:'Montserrat',sans-serif;
    font-weight:600;
    font-size:15.5px;
    text-decoration:none;
    border:1.5px solid transparent;
    transition:transform .15s ease, box-shadow .15s ease;
    box-shadow:0 3px 10px rgba(23,62,59,0.08);
  }
  .btn:active{ transform:scale(0.98); }
  .btn-primary{
    background:var(--teal-deep);
    color:#ffffff;
  }
  .btn-secondary{
    background:var(--turquoise);
    color:#ffffff;
  }
  .btn-outline{
    background:#ffffff;
    color:var(--teal-deep);
    border:1.5px solid var(--sky);
  }
  .btn .emoji{ font-size:18px; }
  .divider{
    display:flex;
    align-items:center;
    gap:10px;
    margin:30px 0 22px;
    color:var(--gold);
    font-size:11px;
    letter-spacing:.2em;
    text-transform:uppercase;
  }
  .divider::before,.divider::after{
    content:"";
    flex:1;
    height:1px;
    background:var(--sky);
  }
  .socials{
    display:flex;
    justify-content:center;
    gap:22px;
    margin-bottom:10px;
  }
  .socials a{
    color:var(--teal-deep);
    text-decoration:none;
    font-size:13.5px;
    font-weight:500;
    border-bottom:1px solid var(--gold);
    padding-bottom:2px;
  }
  .footer{
    margin-top:34px;
    font-size:11.5px;
    color:#8a9a97;
  }
  .quote{
    font-family:'Playfair Display', serif;
    font-style:italic;
    color:var(--teal);
    font-size:14px;
    margin:26px 0 0;
  }
</style>
</head>

        alert('Nie udało się otworzyć oferty. Spróbuj ponownie za chwilę.');
      }
    });
  </script>
